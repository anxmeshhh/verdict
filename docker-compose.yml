# Verdict server stack (Phase 5): API + worker + Postgres + Redis.
# One-time: cp .env.example .env, fill it in (setup.sh / setup.ps1 does this),
# then: docker compose up -d --build
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: verdict
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-verdict}
      POSTGRES_DB: verdict
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verdict"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  api:
    build: .
    command: ["api"]
    ports:
      - "${VERDICT_PORT:-8400}:8400"
    environment: &verdict_env
      VERDICT_DATABASE_URL: postgresql://verdict:${POSTGRES_PASSWORD:-verdict}@postgres:5432/verdict
      VERDICT_REDIS_URL: redis://redis:6379/0
      VERDICT_SERVER_API_KEY: ${VERDICT_SERVER_API_KEY:-}
      # Provider config for webhook-cloned repos + env-key resolution
      VERDICT_PROVIDER: ${VERDICT_PROVIDER:-}
      VERDICT_MODEL: ${VERDICT_MODEL:-}
      VERDICT_BASE_URL: ${VERDICT_BASE_URL:-}
      VERDICT_OLLAMA_URL: ${VERDICT_OLLAMA_URL:-}
      VERDICT_API_KEY: ${VERDICT_API_KEY:-}
      # GitHub integration (webhook path)
      VERDICT_GITHUB_WEBHOOK_SECRET: ${VERDICT_GITHUB_WEBHOOK_SECRET:-}
      VERDICT_GITHUB_TOKEN: ${VERDICT_GITHUB_TOKEN:-}
      # Shared data dir: repos + sandbox scratch, visible to the HOST daemon.
      # HOST_DATA_DIR must be the absolute host path of ./data (setup writes it).
      VERDICT_REPOS_DIR: /data/repos
      VERDICT_HOST_PATH_MAP: /data=${HOST_DATA_DIR:?run setup.sh / setup.ps1 first - it writes HOST_DATA_DIR into .env}
    volumes:
      - ./data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8400/health"]
      interval: 5s
      timeout: 5s
      retries: 30

  worker:
    build: .
    command: ["worker"]
    environment:
      <<: *verdict_env
      VERDICT_WORKER_CONCURRENCY: ${VERDICT_WORKER_CONCURRENCY:-2}
    volumes:
      - ./data:/data
      # The worker launches sandbox containers via the HOST daemon (DooD) -
      # the only privileged access in the stack, and the reason
      # VERDICT_HOST_PATH_MAP exists.
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Optional local LLM: docker compose --profile ollama up -d
  # Then: VERDICT_OLLAMA_URL=http://ollama:11434 in .env, and
  #   docker compose exec ollama ollama pull qwen2.5-coder:7b
  ollama:
    image: ollama/ollama
    profiles: ["ollama"]
    volumes:
      - ollama:/root/.ollama

volumes:
  pgdata:
  ollama:
