[project]
name = "verdict"
version = "0.1.0"
description = "Independent, self-hosted pre-deployment verification for AI-generated and human-written code."
requires-python = ">=3.10"
dependencies = [
    "typer>=0.19",
]

[project.scripts]
verdict = "verdict.cli:app"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["verdict"]
